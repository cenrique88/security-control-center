services:
  postgres:
    image: postgres:16-alpine
    container_name: sscc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sscc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sscc}
      POSTGRES_DB: ${POSTGRES_DB:-sscc}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sscc} -d ${POSTGRES_DB:-sscc}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
